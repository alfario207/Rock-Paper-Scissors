<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✊-✋-Scissors</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Odibee+Sans&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <main class="content">
        <div class="container">
            <div class="title">
                <h1>✊-✋-Scissors</h1>
            </div>
            <div class="result">
                <div class="game-result">
                    <p id="game"></p>
                </div>
                <div class="score-result">
                    <div>
                        <h2>Score</h2>
                    </div>
                    <div class="score">
                        <p id="human"></p>
                        <p id="computer"></p>
                    </div>
                </div>
            </div>
            <div class="btn-container">
                <div class="btn-wrap">
                    <button class="btn-pilihan" id="✊">✊</button>
                    <button class="btn-pilihan" id="✋">✋</button>
                    <button class="btn-pilihan" id="✌️">✌️</button>
                    <button id="Restart" class="hidden">🔄</button>
                </div>
            </div>
        </div>
    </main>


    <script src="main.js"></script>
</body>
</html>
